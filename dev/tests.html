<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="content-type" content="text/html; charset=utf-8" />
	<title>NyckelDB tests</title>
	<style>
		body {
			font-family: 'Arial Unicode MS';
			background-color: #222;
			color: lightblue;
		}

		.output {
			padding: 10px;
			margin: 0;
			border: 1px solid #333;
			background-color: black;
			color: white;
			overflow-wrap: break-word;
		}
	</style>
</head>
<body>
	<h1>NyckelDB tests</h1>

	<button onclick="javascript: APP.Sto.nuke(); if (window.location && window.location.reload) window.location.reload(true);">Clear localStorage Cache</button>
	<table id="testTable">
		<thead>
			<tr>
				<td>Test</td>
				<td>obj</td>
				<td>returned</td>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>1</td>
				<td id=output1 class="output"></td>
				<td id=output2 class="output"></td>
			</tr>
			<tr>
				<td>2</td>
				<td id=output3 class="output"></td>
				<td id=output4 class="output"></td>
			</tr>
			<tr>
				<td>3</td>
				<td id=output5 class="output"></td>
				<td id=output6 class="output"></td>
			</tr>
			<tr>
				<td>4</td>
				<td id=output7 class="output"></td>
				<td id=output8 class="output"></td>
			</tr>
			<tr>
				<td>5</td>
				<td id=output9 class="output"></td>
				<td id=output10 class="output"></td>
			</tr>
			<tr>
				<td>6</td>
				<td id=output11 class="output"></td>
				<td id=output12 class="output"></td>
			</tr>
		</tbody>
	</table>
	<div class="hidden" id="comboBoxDiv">
		<input type="file" accept=".json" name="json[]" id="json" size="10" />
		<a id="hiddenDownloadLink" download="" href="" style="display:none"></a>
	</div>

	<script type="text/javascript" src="../scripts/debugmode.min.js"></script>
	<script type="text/javascript" src="../scripts/Lawnchair.js"></script>
	<script type="text/javascript" src="../scripts/adapters/memory.js"></script>
	<script type="text/javascript" src="../scripts/adapters/indexed-db.js"></script>
	<script type="text/javascript" src="../scripts/adapters/dom.js"></script>
	<script type="text/javascript" src="../scripts/base64.min.js"></script>
	<script type="text/javascript" src="../scripts/storage.js"></script>
	<!-- <script type="text/javascript" src="../scripts/validate.min.js"></script> -->
	<script type="text/javascript" src="../scripts/nyckelDB.js"></script>

	<script>
		function test(n, title, description) {
			var tableTitle = "Test " + n + ": " + title;
			if (options && options.importData) options.importData.title = tableTitle;
			callback = function (ret, err) { document.getElementById('output' + n * 2).innerHTML = "returned: " + ret + ", errors: " + err; };
			db[n] = new NyckelDB(tableTitle);
			db[n].init(tableHeaders, columnProperties, options, callback);
			document.getElementById('output' + (n * 2 - 1)).innerHTML = JSON.stringify(db[n]);
			dbNum++;
		}
		function testMethods(testName, method, showLastModBool, callbackBool) {
			testNum++;
			var cell;
			table.insertRow();
			table.rows[0].insertCell(table.rows[0].cells.length).innerHTML = testName;
			results[testNum] = [];
			for (a = 1, len = dbNum; a < len; a++) {
				cell = table.rows[a].insertCell(table.rows[a].cells.length);
				cell.setAttribute("class", "output");

				//execute test method with callback
				if (callbackBool){
					 method(a, function (result, error) {
						if (error) results[testNum][a] = "Error: " + error;
						else results[testNum][a] = result;
					});
				}
				//without callback
				else  results[testNum][a] = method(a);

				if (typeof results[testNum][a] === "object" && results[testNum][a] !== null && results[testNum][a].getLength) results[testNum][a] = "Len=" + results[testNum][a].getLength();
				cell.innerHTML = showLastModBool ? results[testNum][a] + "<br>" + new Date((Number(db[a].getLastModified()) * 6e4) + 15e11).toLocaleString() : results[testNum][a];
				var handler = (function (a, testNum) {
					return function () {
						results[testNum][a] = method(a);
						if (typeof results[testNum][a] === "object" && results[testNum][a].getLength) results[testNum][a] = "Len=" + results[testNum][a].getLength();
						cell = table.rows[a].cells[testNum + 2];
						cell.innerHTML = showLastModBool ? results[testNum][a] + "<br>" + db[a].getLastModified() : results[testNum][a];
					};
				}(a, testNum));
				cell.addEventListener("click", handler);
			}
		}
		APP.setDebugMode(true);
		var tableHeaders = ["column_1", "column_2", "column 3"],
			columnProperties = ["string", "number", "boolean"],
			options = { customProperties: ["prop1", "prop_2", "prop 3"] },
			callback,
			db = [],
			a = 1,
			len,
			table = document.getElementById("testTable"),
			results = [],
			runTime = Math.floor((new Date().getTime() - 15e11) / 6e4),
			testNum = 0,
			dbNum = 1,
			debug = APP.debug;

		//test 1: headers and customProperties as array
		test(1, "Arrays", "Initiate table column headers as an Array");

		//test 2: headers and customProperties as columnName(key): columnType(value) pairs (including id)
		options.customProperties = { prop1: "string", prop_2: "number", "prop 3": "boolean" };
		tableHeaders = { column_1: "string", column_2: "numbers", "column 3": "boolean", id: "string" };
		columnProperties = null;
		test(2, "Key:Value Pairs", "Initiate table column headers, column types, and custom propertes as key:value pairs");

		//test 3: headers and customProperties as object with "type" property
		options.customProperties = {prop1: { type: "string" }, prop_2: { type: "number" }, "prop 3": { type: "boolean"} };
		tableHeaders = { "column_1": { type: "String" }, "column_2": { type: "Number" }, "column 3": { type: "Boolean" } };
		test(3, "Key:Object Pairs", "Initiate table column headers, column type and custom properties as key:object pairs containing 'type' property");

		//test 4: headers and customProperties as mixed object with additional properties
		options = {
			customProperties: {
				prop1: "string",
				"prop 2": { type: "Number" },
				"prop_3": {
					type: "boolean",
					initialValue: false
				}
			}
		};
		tableHeaders = { "column_1": "str", "column_2": {type: "num" }, "column 3": { type: "bool", searchable: false, initialValue: true } };
		test(4, "Mixed", "Initiate table column headers, types and properties as a mixture of key:value and key:object pairs, including an 'initialValue' property");

		//test 5: deleted table
		options = {
			importData: {
				created: runTime,
				lastModified: runTime,
				deleted: runTime
			}
		};
		test(5, "Deleted", 'Initiate a deleted table');

		//test 6: backwards compatibility with version 0.3
		options = {
			importData: {//version 0.3 formated import data
				created: runTime,
				lastModified: runTime,
				title: "Test_6",
				version: "0.1",
				ids: { "aaa": [0, 0, 0, 0], "aab": [0, 0, 0, 0] },
				headers: ["id", "column_1", "column 1", "column 3"],
				types: { column_1: "string", "column 1": "number", "column 3": "boolean" },
				table: [["aaa", "hello", 1, true], ["aab", "world", 2, false]],
				properties: { "prop1": ["hello", 0, "string"], "prop 2": [10, 0, "number"], "prop_3": [true, 0, "bool"] }
			}
		};
		test(6, "Backwards Compatibility","Backwards compatibility test importing < v0.3 data");

		//getTitle()	DONE
		testMethods("title", function (a) { return db[a].getTitle(); });
		//getLastModified()
		testMethods("lastMod", function (a) { return new Date((Number(db[a].getLastModified()) * 6e4) + 15e11).toLocaleString(); });
		//isDeleted()	DONE
		testMethods("isDel", function (a) { return db[a].isDeleted(); });
		//addRow(array, id)	DONE
		testMethods("addRow", function (a) { return db[a].addRow(["hello", 2, false], "aaa"); }, true);
		//addColumn(colName, position, options, callback)
		testMethods("addColumn", function (a) { return db[a].addColumn("column_4", 4, { type: "string", initialValue: "hello, I'm new here", searchable: true }); }, true);
		//setType(colName, type, data, callback)
		testMethods("setType", function (a) {
			db[a].addColumn("column_5", 5, { type: "any", initialValue: false });
			return db[a].setType("column_5", "boolean", null, function (data, err) {
				if (err === "cannot apply type to this row, please update data and try again" && data) {
					for (let row in data.column_4) {
						data.column_4[row] = true;
					}
					db[a].setType("column_5", "boolean", data, function (data, err) {
						return data;
					});
				}
				else return false;
			});
		}, true);
		//deleteColumn(colName)
		testMethods("deleteColumn", function (a) { db[a].addColumn("column_6"); return db[a].deleteColumn("column 6"); }, true);
		//getLength()	DONE
		testMethods("length", function (a) { return db[a].getLength(); });
		//setVal(rowId, colName, newValue)
		testMethods("setVal", function (a) { return db[a].setVal(results[4][a], "column_1", "yes"); }, true);
		//getVal(rowId, colName)
		testMethods("getVal", function (a) { return db[a].getVal(results[4][a], "column_1"); });
		//getIndexOf(id, orValue, colName)
		testMethods("indexOf", function (a) { return db[a].getIndexOf("aaa"); });
		testMethods("indexOf2", function (a) { return db[a].getIndexOf(null, "yes", "column_1"); });
		//setProp(propName, value)
		testMethods("setProp", function (a) { return db[a].setProp("prop1", "hej"); }, true);
		//getProp(propName)
		testMethods("getProp", function (a) { return db[a].getProp("prop1"); });
		//sortByCol(colName, options)
		options = null;
		testMethods("sort1", function (a) { return db[a].sortByCol("column_1", null); });
		//search(searchTerms, options)
		testMethods("search", function (a, callback) { return db[a].search("hello", null, callback); }, false, true);
		//advancedSearch(searchTerms, options)
		testMethods("advancedSearch", function (a, callback) { return db[a].advancedSearch("hello", null, callback); }, false, true);
		//forEach(funct, callback)
		testMethods("forEachRow", function (a) { return db[a].forEachRow(function (id) { return db[a].getVal(id, "column_2"); }, function (a, b) { if (b) console.log("error", b); }); });
		//shuffle()
		testMethods("shuffle", function (a) { return db[a].shuffle(); });
		//hideRow(rowId)
		testMethods("hide", function (a) { return db[a].hideRow("aaa"); });
		//unhideRows()
		testMethods("unhide", function (a) { return db[a].unhideRows(); });
		//filter(colName, regExp)
		testMethods("filter", function (a) { return db[a].filter("column_3", /true/i); });
		//unfilter()
		testMethods("unfilter", function (a) { return db[a].unfilter(); });
		//deleteRow(rowId)
		testMethods("delRow", function (a) { return db[a].deleteRow(results[4][a]); }, true);
		testMethods("length", function (a) { return db[a].getLength(); });
		//toCSV()
		testMethods("toCSV", function (a) { return db[a].toCSV(); });
		//toJSON_Array()
		testMethods("toJSON1", function (a) { return db[a].toJSON_Array(); });
		//toJSON_KeyValuePairs()
		testMethods("toJSON2", function (a) { return db[a].toJSON_KeyValuePairs(); });
		//sync(forceSyncBool, callback)
		testMethods("sync", function (a) { return db[a].sync(true, callback); }, true);
		//setTitle(newTitle, callback)
		testMethods("setTitle", function (a) { return db[a].setTitle("Test2-" + a, callback); }, true);
		//deleteTable(callback)
		testMethods("deleteTable", function (a) { return db[a].deleteTable(callback); }, true);

		//cleanup
		for(let a = 1,lenA = db.length; a < lenA; a++){
			db[a].deleteColumn("column_4");
			db[a].deleteColumn("column_5");
		}
	</script>
</body>
</html>
